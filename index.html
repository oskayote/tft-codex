// ============================================================
// localStorage shim that matches the API the artifact expected
// (window.storage.get / set / delete return promises).
// ============================================================
const storage = {
  async get(key) {
    try {
      const v = localStorage.getItem(key);
      if (v === null) return null;
      return { key, value: v };
    } catch (e) { return null; }
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || (k && k.startsWith(prefix))) keys.push(k);
    }
    return { keys, prefix };
  },
};

      "Vulnerable to: high sustained DPS (Vex 2, Yi 3). True damage punches through your armor stacking — Eradicator-heavy enemy boards counter you. Anti-heal isn't a huge deal here since you don't sustain with omnivamp. If you don't hit 3-stars by 4-2 you will lose; this comp has a hard timing window.",
  },
];

// ---- helpers ----
const STORAGE_KEY = "tft:codex:comps:v2";        // current (frontline-top)
const STORAGE_KEY_V1 = "tft:codex:comps:v1";    // legacy (frontline-bottom)

// Convert a champion display name to a CommunityDragon asset slug.
// "Master Yi" -> "masteryi", "Cho'Gath" -> "chogath", "Bel'Veth" -> "belveth"
function champSlug(name) {
  if (!name) return "";
  return name.toLowerCase().replace(/[^a-z0-9]/g, "");
}

// Build the default portrait URL from a champion name.
// Falls back gracefully via onError to initials if the image 404s
// (e.g. for TFT-exclusive units like "The Mighty Mech").
function defaultChampImage(name) {
  const slug = champSlug(name);
  if (!slug) return "";
  return `https://raw.communitydragon.org/latest/game/assets/characters/${slug}/hud/${slug}_square.png`;
}

function getChampImageURL(champ) {
  if (!champ) return "";
  if (champ.image && champ.image.trim()) return champ.image.trim();
  return defaultChampImage(champ.name);
}

// Reusable portrait component with image + initials fallback
function ChampPortrait({ champ, size = 48, square = false }) {
  const [failed, setFailed] = useState(false);
  if (!champ) return null;
  const cost = COST_COLORS[champ.cost] || COST_COLORS[1];
  const url = getChampImageURL(champ);
  const initials = (champ.name || "?")
    .split(/[\s'\-.&]+/)
    .filter(Boolean)
    .map((w) => w[0])
    .slice(0, 2)
    .join("")
    .toUpperCase();

  const baseStyle = {
    width: size,
    height: size,
    borderRadius: square ? 6 : "50%",
    border: `2px solid ${cost.ring}`,
    objectFit: "cover",
    flexShrink: 0,
    boxShadow: `0 0 12px ${cost.ring}40`,
    background: cost.bg,
    display: "block",
  };

  if (failed || !url) {
    return (
      <div
        style={{
          ...baseStyle,
          display: "grid",
          placeItems: "center",
          fontFamily: fontDisplay,
          fontWeight: 800,
          fontSize: size * 0.36,
          color: cost.text,
          letterSpacing: 0.5,
        }}
      >
        {initials}
      </div>
    );
  }

  return (
    <img
      src={url}
      alt={champ.name}
      onError={() => setFailed(true)}
      style={baseStyle}
      loading="lazy"
    />
  );
}

  positioning: {
    grid: [
      [null, null, null, null, null, null, null],
      [null, null, null, null, null, null, null],
      [null, null, null, null, null, null, null],

function TFTCodex() {
  const [comps, setComps] = useState(SEED_COMPS);
  const [selectedId, setSelectedId] = useState(SEED_COMPS[0].id);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(null);
  const [search, setSearch] = useState("");
  const [loadState, setLoadState] = useState("loading"); // loading | ready
  const [tierFilter, setTierFilter] = useState("ALL");

  // Load from persistent storage on mount
  useEffect(() => {
    (async () => {
      try {
        // Try current schema first
        const result = await storage.get(STORAGE_KEY);
        if (result && result.value) {
          const parsed = JSON.parse(result.value);
          if (Array.isArray(parsed) && parsed.length) {
            setComps(parsed);
            setSelectedId(parsed[0].id);
            setLoadState("ready");
            return;
          }
        }
      } catch (e) {
        // not present — fall through to migration
      }
      try {
        // Legacy schema: grid was frontline-bottom — flip each grid row order
        const legacy = await storage.get(STORAGE_KEY_V1);
        if (legacy && legacy.value) {
          const parsed = JSON.parse(legacy.value);
          if (Array.isArray(parsed) && parsed.length) {
            const migrated = parsed.map((c) => ({
              ...c,
              positioning: {
                ...(c.positioning || {}),
                grid:
                  c.positioning && Array.isArray(c.positioning.grid)
                    ? [...c.positioning.grid].reverse()
                    : emptyGrid(),
                notes: c.positioning?.notes || "",
              },
            }));
            setComps(migrated);
            setSelectedId(migrated[0].id);
          }
        }
      } catch (e) {
        // first run — keep seeds
      }
      setLoadState("ready");
    })();
  }, []);

  // Save whenever comps change (after initial load)
  useEffect(() => {
    if (loadState !== "ready") return;
    (async () => {
      try {
        await storage.set(STORAGE_KEY, JSON.stringify(comps));
      } catch (e) {
        console.error("save failed", e);
      }
    })();
  }, [comps, loadState]);

  const selected = useMemo(
    () => comps.find((c) => c.id === selectedId) || comps[0],
    [comps, selectedId]
  );

  const filtered = useMemo(() => {
    return comps.filter((c) => {
      if (tierFilter !== "ALL" && c.tier !== tierFilter) return false;
      if (!search) return true;
      const q = search.toLowerCase();
      return (
        c.name.toLowerCase().includes(q) ||
        c.playstyle.toLowerCase().includes(q) ||
        (c.champions || []).some((ch) => ch.name.toLowerCase().includes(q))
      );
    });
  }, [comps, search, tierFilter]);

  function startEdit() {
    setDraft(JSON.parse(JSON.stringify(selected)));
    setEditing(true);
  }
  function cancelEdit() {
    setDraft(null);
    setEditing(false);
  }
  function saveEdit() {
    setComps((cs) => cs.map((c) => (c.id === draft.id ? draft : c)));
    setEditing(false);
    setDraft(null);
  }
  function createNew() {
    const c = newBlankComp();
    setComps((cs) => [c, ...cs]);
    setSelectedId(c.id);
    setDraft(JSON.parse(JSON.stringify(c)));
    setEditing(true);
  }
  function duplicateCurrent() {
    const dup = JSON.parse(JSON.stringify(selected));
    dup.id = `comp-${Date.now()}`;
    dup.name = dup.name + " (copy)";
    setComps((cs) => [dup, ...cs]);
    setSelectedId(dup.id);
  }
  function deleteCurrent() {
    if (comps.length <= 1) return;
    if (!confirm(`Delete "${selected.name}"? This can't be undone.`)) return;
    const next = comps.filter((c) => c.id !== selected.id);
    setComps(next);
    setSelectedId(next[0].id);
  }
  function exportJSON() {
    const blob = new Blob([JSON.stringify(comps, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tft-codex.json";
    a.click();
    URL.revokeObjectURL(url);
  }
  function importJSON(data) {
    if (!Array.isArray(data) || data.length === 0) {
      alert("That file doesn't look like a TFT Codex export (expected a non-empty array).");
      return;
    }
    if (!confirm(`Import ${data.length} comps? This will REPLACE your current comps. (Tip: export first to back them up.)`)) return;
    setComps(data);
    setSelectedId(data[0].id);
  }
  function resetSeeds() {
    if (!confirm("Reset all comps to defaults? Your edits will be lost.")) return;
    setComps(SEED_COMPS);
    setSelectedId(SEED_COMPS[0].id);
  }

  const view = editing ? draft : selected;

  return (
    <div style={styles.shell}>
      <BgEffects />
      <Topbar
        onNew={createNew}
        onExport={exportJSON}
        onImport={importJSON}
        onReset={resetSeeds}
      />
      <div style={styles.body}>
        <Sidebar
          comps={filtered}
          allCount={comps.length}
          selectedId={selected?.id}
          onSelect={(id) => {
            if (editing) return;
            setSelectedId(id);
          }}
          search={search}
          setSearch={setSearch}
          tierFilter={tierFilter}
          setTierFilter={setTierFilter}
          onNew={createNew}
        />
        <main style={styles.main}>
          {view ? (
            <CompView
              comp={view}
              editing={editing}
              onChange={setDraft}
              onEdit={startEdit}
              onCancel={cancelEdit}
              onSave={saveEdit}
              onDuplicate={duplicateCurrent}
              onDelete={deleteCurrent}
              canDelete={comps.length > 1}
            />
          ) : (
            <div style={{ padding: 40 }}>No comp selected.</div>
          )}
        </main>
      </div>
    </div>
  );
}

    onChange(champions.filter((_, idx) => idx !== i));
  }
  function add() {
    onChange([
      ...champions,
      { name: "New Champion", cost: 1, stars: 2, traits: "", items: "", role: "" },

  return (
    <div>
      <div style={styles.champGrid}>
        {champions.map((c, i) => (
          <ChampCard
            key={i}
            champ={c}
            editing={editing}
            onChange={(patch) => update(i, patch)}
            onRemove={() => remove(i)}

          <button onClick={add} style={styles.addCard}>

            <span style={{ marginTop: 6, fontSize: 12, letterSpacing: 1 }}>add unit</span>
          </button>

  );
}

              onChange={(e) => onChange({ stars: parseInt(e.target.value, 10) })}
            >
              {[1, 2, 3].map((n) => (
                <option key={n} value={n}>{n}★</option>
              ))}
            </select>
          </div>
          <input
            style={{ ...styles.input, marginBottom: 6 }}
            value={champ.traits || ""}
            onChange={(e) => onChange({ traits: e.target.value })}
            placeholder="Traits (e.g. Brawler · Primordian)"
          />
          <input
            style={{ ...styles.input, marginBottom: 6 }}
            value={champ.items || ""}
            onChange={(e) => onChange({ items: e.target.value })}
            placeholder="Items (comma-separated)"
          />
          <input
            style={{ ...styles.input, marginBottom: 6 }}
            value={champ.role || ""}
            onChange={(e) => onChange({ role: e.target.value })}
            placeholder="Role (carry / tank / utility)"
          />
          <input
            style={{ ...styles.input, marginBottom: 8, fontSize: 11 }}
            value={champ.image || ""}
            onChange={(e) => onChange({ image: e.target.value })}
            placeholder="Image URL (optional — auto if blank)"
          />
          <button style={styles.removeBtn} onClick={onRemove}>
            <Icon name="trash-2" size={11} /> remove
          </button>
        </>
      ) : (
        <>
          <div style={{ ...styles.champName, color: cost.text }}>{champ.name}</div>
          {champ.role && <div style={styles.champRole}>{champ.role}</div>}
          {champ.traits && <div style={styles.champTraits}>{champ.traits}</div>}
          {champ.items && (
            <div style={styles.itemPills}>
              {champ.items.split(",").map((it, i) => {
                const t = it.trim();
                if (!t) return null;
                return (
                  <span key={i} style={styles.itemPill}>
                    {t}
                  </span>
                );
              })}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// =============================================================
// Leveling Table
// =============================================================
function LevelingTable({ rows, editing, onChange }) {
  function update(i, patch) {
    onChange(rows.map((r, idx) => (idx === i ? { ...r, ...patch } : r)));
  }
  function remove(i) {
    onChange(rows.filter((_, idx) => idx !== i));
  }
  function add() {
    onChange([...rows, { stage: "", action: "", econ: "" }]);
  }
  return (
    <div style={styles.tableWrap}>
      <div style={styles.tableHead}>
        <div style={{ width: 90 }}>STAGE</div>
        <div style={{ flex: 2 }}>ACTION</div>
        <div style={{ flex: 1 }}>ECONOMY</div>
        {editing && <div style={{ width: 32 }} />}
      </div>
      {rows.map((r, i) => (
        <div key={i} style={styles.tableRow}>
          <div style={{ width: 90 }}>
            {editing ? (
              <input
                style={styles.inputSm}
                value={r.stage}
                onChange={(e) => update(i, { stage: e.target.value })}
              />
            ) : (
              <span style={styles.stagePill}>{r.stage}</span>
            )}
          </div>
          <div style={{ flex: 2 }}>
            {editing ? (
              <textarea
                style={styles.textareaSm}
                rows={2}
                value={r.action}
                onChange={(e) => update(i, { action: e.target.value })}
              />
            ) : (
              <div>{r.action}</div>
            )}
          </div>
          <div style={{ flex: 1 }}>
            {editing ? (
              <textarea
                style={styles.textareaSm}
                rows={2}
                value={r.econ}
                onChange={(e) => update(i, { econ: e.target.value })}
              />
            ) : (
              <div style={styles.econCell}>{r.econ}</div>
            )}
          </div>
          {editing && (
            <button style={styles.iconBtn} onClick={() => remove(i)}>
              <Icon name="trash-2" size={12} />
            </button>
          )}
        </div>
      ))}
      {editing && (
        <button onClick={add} style={styles.addRowBtn}>
          <Icon name="plus" size={12} /> add stage row
        </button>
      )}
    </div>
  );
}

// =============================================================
// Positioning Hex Grid
// =============================================================
function PositioningEditor({ positioning, champions, editing, onChange }) {
  const grid = positioning.grid || emptyGrid();
  const [pickerCell, setPickerCell] = useState(null); // {r,c}

  // Map champion name -> full champ object so the hex tiles can show portraits.
  const byName = useMemo(() => {
    const m = {};
    (champions || []).forEach((c) => {
      if (c?.name) m[c.name] = c;
    });
    return m;
  }, [champions]);

  function setCell(r, c, name) {
    const next = grid.map((row, ri) =>
      row.map((cell, ci) => (ri === r && ci === c ? name : cell))
    );
    onChange({ ...positioning, grid: next });
    setPickerCell(null);
  }

  return (
    <div>
      <div style={styles.boardWrap}>
        <div style={styles.boardLabel}>↑ FRONTLINE — closest to enemy</div>
        <div style={styles.hexBoard}>
          {grid.map((row, ri) => (
            <div
              key={ri}
              style={{
                ...styles.hexRow,
                marginLeft: ri % 2 === 1 ? 39 : 0,
              }}
            >
              {row.map((cell, ci) => (
                <Hex
                  key={ci}
                  champion={cell}
                  champData={cell ? byName[cell] : null}
                  editing={editing}
                  onClick={() => {
                    if (!editing) return;
                    if (cell) {
                      setCell(ri, ci, null);
                    } else {
                      setPickerCell({ r: ri, c: ci });
                    }
                  }}
                />
              ))}
            </div>
          ))}
        </div>
        <div style={styles.boardLabel}>↓ BACKLINE — your side</div>
      </div>

      {pickerCell && (
        <div style={styles.picker}>
          <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 8, letterSpacing: 1 }}>
            ASSIGN UNIT TO ROW {pickerCell.r + 1} {pickerCell.r === 0 ? "(FRONTLINE)" : pickerCell.r === grid.length - 1 ? "(BACKLINE)" : ""} · COL {pickerCell.c + 1}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {champions.length === 0 && (
              <div style={{ color: "#64748b", fontSize: 12 }}>
                add units in the Final Board section first.
              </div>
            )}
            {champions.map((c, i) => {
              const cost = COST_COLORS[c.cost] || COST_COLORS[1];
              return (
                <button
                  key={i}
                  onClick={() => setCell(pickerCell.r, pickerCell.c, c.name)}
                  style={{
                    ...styles.pickerBtn,
                    borderColor: cost.ring,
                    color: cost.text,
                  }}
                >
                  <ChampPortrait champ={c} size={22} />
                  <span>{c.name}</span>
                </button>
              );
            })}
            <button
              onClick={() => setPickerCell(null)}
              style={{ ...styles.pickerBtn, borderColor: "#475569", color: "#94a3b8" }}
            >
              cancel
            </button>
          </div>
        </div>
      )}

      <div style={{ marginTop: 16 }}>
        <div style={styles.notesLabel}>POSITIONING NOTES</div>
        {editing ? (
          <textarea
            style={styles.textarea}
            rows={4}
            value={positioning.notes || ""}
            onChange={(e) => onChange({ ...positioning, notes: e.target.value })}
            placeholder="Why this positioning. Adjustments vs assassins, ranged, AOE…"
          />
        ) : (
          <div style={styles.proseBox}>{positioning.notes || <em style={{ opacity: 0.5 }}>—</em>}</div>
        )}
      </div>
    </div>
  );
}

function Hex({ champion, champData, editing, onClick }) {
  const filled = !!champion;
  const cost = champData ? COST_COLORS[champData.cost] || COST_COLORS[1] : null;
  return (
    <button
      onClick={onClick}
      disabled={!editing && !filled}
      title={champion || (editing ? "click to assign" : "")}
      style={{
        ...styles.hex,
        cursor: editing ? "pointer" : "default",
        background: filled
          ? cost
            ? `linear-gradient(135deg, ${cost.bg}, rgba(20,21,42,0.4))`
            : "linear-gradient(135deg, rgba(168,85,247,0.4), rgba(59,130,246,0.3))"
          : editing
          ? "rgba(30,41,59,0.6)"
          : "rgba(15,20,38,0.5)",
        border: filled
          ? `1px solid ${cost ? cost.ring : "rgba(192,132,252,0.7)"}`
          : "1px solid rgba(71,85,105,0.4)",
        boxShadow: filled
          ? cost
            ? `0 0 14px ${cost.ring}55`
            : "0 0 18px rgba(168,85,247,0.35)"
          : "none",
      }}
    >
      {filled && champData ? (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
          <ChampPortrait champ={champData} size={36} />
          <span style={styles.hexLabel}>
            {champion.length > 8 ? champion.slice(0, 7) + "…" : champion}
          </span>
        </div>
      ) : filled ? (
        <span style={styles.hexLabel}>
          {champion.length > 8 ? champion.slice(0, 7) + "…" : champion}
        </span>
      ) : null}
    </button>
  );
}
